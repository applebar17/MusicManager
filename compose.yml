services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command:
      - uv
      - run
      - uvicorn
      - music_manager_backend.api.app:app
      - --app-dir
      - backend
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace/backend
      - ./alembic.ini:/workspace/alembic.ini:ro
      - ./local:/workspace/local
      # Expose macOS mounted drives to the backend so environment roots like
      # /Volumes/TORDIS are visible inside the container.
      - /Volumes:/Volumes
      # Expose the current macOS user's Downloads folder so download_path values
      # like /Users/<user>/Downloads validate inside the backend container.
      - ${HOME}/Downloads:${HOME}/Downloads:ro
      - ${HOME}/Desktop/SomeMusic:${HOME}/Desktop/SomeMusic:ro

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    command:
      - sh
      - -lc
      - npm ci && npm --workspace apps/desktop run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ""
      VITE_BACKEND_PROXY_TARGET: http://backend:8000
    ports:
      - "1420:1420"
    volumes:
      - ./apps:/workspace/apps
      - ./package.json:/workspace/package.json:ro
      - ./package-lock.json:/workspace/package-lock.json:ro
      - desktop_node_modules:/workspace/node_modules
      - desktop_workspace_node_modules:/workspace/apps/desktop/node_modules
    depends_on:
      - backend

volumes:
  desktop_node_modules:
  desktop_workspace_node_modules:
